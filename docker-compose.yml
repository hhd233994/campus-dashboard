version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: campus_dashboard
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - ./src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql-data:/var/lib/mysql
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --init-connect='SET NAMES utf8mb4'
      - --skip-character-set-client-handshake
    networks:
      - campus-network

  redis:
    image: redis:7-alpine
    container_name: campus-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - campus-network

  app:
    build: .
    container_name: campus-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/campus_dashboard?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-123456}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_SQL_INIT_MODE: always
      JWT_SECRET: ${JWT_SECRET:-default-dev-secret-change-in-production}
      TZ: Asia/Shanghai
    networks:
      - campus-network

volumes:
  mysql-data:
  redis-data:

networks:
  campus-network:
    driver: bridge
