# Test configuration
spring.application.name=demo-test
server.port=8081

# Disable schema initialization for tests
spring.sql.init.mode=never

# Use H2 in-memory database for tests (faster and isolated)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Redis config for tests (use embedded or mock)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# JWT config for tests
jwt.secret=test-secret-for-testing-only-not-for-production
jwt.expiration=604800000

# Disable Swagger for tests
springdoc.api-docs.enabled=false
knife4j.enable=false

# Logging
logging.level.root=WARN
logging.level.com.example.campusdashboard=DEBUG
