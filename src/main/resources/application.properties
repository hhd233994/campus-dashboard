spring.application.name=demo
server.port=8080

# Tomcat编码配置
server.tomcat.uri-encoding=UTF-8

# HTTP编码配置
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
spring.http.encoding.force-request=true
spring.http.encoding.force-response=true

# 数据库配置
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/campus_dashboard?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 数据库初始化配置（生产环境禁用自动执行schema.sql，由Railway MySQL插件管理）
spring.sql.init.mode=never
# spring.sql.init.schema-locations=classpath:sql/schema.sql

# MyBatis-Plus配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.example.campusdashboard.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true

# Redis配置
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=0
spring.data.redis.timeout=3000ms

# 缓存配置
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# Knife4j配置
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
knife4j.enable=true
knife4j.setting.language=zh_cn
knife4j.production=false

# Jackson配置
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.charset=UTF-8

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 文件存储路径
file.upload.path=./uploads/

# JWT配置
jwt.secret=${JWT_SECRET:default-dev-secret-change-in-production}
jwt.expiration=604800000
