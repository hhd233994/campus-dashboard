name: Java CI with Maven

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: campus_dashboard_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      run: mvn clean compile test-compile
      env:
        DB_USERNAME: root
        DB_PASSWORD: test_password
        DB_URL: jdbc:mysql://localhost:3306/campus_dashboard_test?useSSL=false&serverTimezone=UTC
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        JWT_SECRET: test-secret-for-ci-only-not-for-production

    - name: Verify compilation success
      run: echo "✅ Project compiled successfully!"

    - name: Build JAR artifact
      run: mvn package -DskipTests

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: campus-dashboard-jar
        path: target/campus-dashboard-1.0.0.jar
